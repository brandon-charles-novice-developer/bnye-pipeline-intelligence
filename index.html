    <title>Pipeline Intelligence | B.Nye Command Center</title>
    <script>
      (function() {
        var q = new URLSearchParams(location.search);
        var p = q.get('p');
        if (p) {
          q.delete('p');
          var qs = q.toString();
          history.replaceState(null, '', p + (qs ? '?' + qs : '') + location.hash);
        }
      })();
    </script>
